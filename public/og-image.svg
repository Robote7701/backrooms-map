  <!-- Titre -->
  <text x="600" y="300" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="72" font-weight="700" fill="#ffd60a" style="text-shadow:0 0 24px rgba(255,214,10,0.6)">BACKROOMS</text>
  <text x="600" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="30" fill="#f2f2fa">Interactive Map</text>
  <text x="600" y="400" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="20" fill="#8b8ba8">99 levels · routes · entities · FR / EN / DE</text>

  <rect x="420" y="440" width="360" height="1" fill="#26263a"/>
  <text x="600" y="480" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="18" fill="#00f0ff">robote7701.github.io/backrooms-map</text>

    <circle cx="1140" cy="110" r="6" fill="#12121c" stroke="#ffd60a" stroke-width="2"/>
    <circle cx="1050" cy="200" r="8" fill="#12121c" stroke="#ffd60a" stroke-width="2.4"/>
    <circle cx="1110" cy="330" r="6" fill="#12121c" stroke="#00f0ff" stroke-width="2.2"/>
    <circle cx="1020" cy="450" r="9" fill="#12121c" stroke="#ff2ec4" stroke-width="2.8"/>
    <circle cx="1090" cy="560" r="6" fill="#12121c" stroke="#ffd60a" stroke-width="2"/>

  </g>
  <g>
    <circle cx="60" cy="120" r="6" fill="#12121c" stroke="#ffd60a" stroke-width="2"/>
    <circle cx="150" cy="220" r="8" fill="#12121c" stroke="#ffd60a" stroke-width="2.4"/>
    <circle cx="90" cy="340" r="6" fill="#12121c" stroke="#00f0ff" stroke-width="2.2"/>
    <circle cx="180" cy="470" r="9" fill="#12121c" stroke="#ff2ec4" stroke-width="2.8"/>
    <circle cx="120" cy="580" r="6" fill="#12121c" stroke="#ffd60a" stroke-width="2"/>
    <circle cx="280" cy="150" r="7" fill="#12121c" stroke="#ffd60a" stroke-width="2.2"/>
    <circle cx="330" cy="60" r="5" fill="#12121c" stroke="#ffd60a" stroke-width="1.8"/>

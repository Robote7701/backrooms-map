<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glowCyan" cx="15%" cy="15%" r="45%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMagenta" cx="88%" cy="85%" r="45%">
      <stop offset="0%" stop-color="#ff2ec4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ff2ec4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#030305"/>
  <rect width="1200" height="630" fill="url(#glowCyan)"/>
  <rect width="1200" height="630" fill="url(#glowMagenta)"/>

  <!-- Graphe décoratif : nœuds + routes, cantonnés aux bords pour ne pas
       croiser le titre (zone centrale ~x:370-830 y:200-470 réservée). -->
  <g stroke-width="1.4" opacity="0.7">
    <line x1="60" y1="120" x2="150" y2="220" stroke="#41415c"/>
    <line x1="150" y1="220" x2="90" y2="340" stroke="#00f0ff" stroke-dasharray="4 5"/>
    <line x1="90" y1="340" x2="180" y2="470" stroke="#ffd60a"/>
    <line x1="180" y1="470" x2="120" y2="580" stroke="#41415c"/>
    <line x1="150" y1="220" x2="280" y2="150" stroke="#b14bff" stroke-dasharray="1 5"/>
    <line x1="280" y1="150" x2="330" y2="60" stroke="#41415c"/>

    <line x1="1140" y1="110" x2="1050" y2="200" stroke="#41415c"/>
